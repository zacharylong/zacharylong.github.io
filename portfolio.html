<!DOCTYPE html>
<html>
<head>
    <title>16-bit Game Portfolio</title>
    <style>
        /* Add your CSS styles here */
        #map {
            background-image: url('wor.png');
            width: 800px;
            height: 600px;
            position: relative;
        }
        .island {
            position: absolute;
        }
        .popup {
            display: none;
            position: absolute;
            /* Add more styles to make the popup look like a 16-bit dialog box */
        }
    </style>
</head>
<body>
    <div id="map">
        <div class="island" style="top: 100px; left: 100px;">
            <img src="Mog - Walk (Front).gif">
            <div class="popup">
                <h2>Project 1</h2>
                <p>Description of project 1.</p>
                <a href="project1.html">View Project</a>
            </div>
        </div>
        <div class="island" style="top: 180px; left: 180px;">
            <img src="Terra - Walk (Front).gif">
            <div class="popup">
                <h2>Project 2</h2>
                <p>Description of project 2.</p>
                <a href="project2.html">View Project</a>
            </div>
        </div>
        <div class="island" style="top: 300px; left: 350px;">
            <img src="Sabin - Laugh.gif">
            <div class="popup">
                <h2>Project 3</h2>
                <p>Description of project 3.</p>
                <a href="project3.html">View Project</a>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Add your JavaScript code here
        $(document).ready(function() {
            $('.island').hover(function() {
                $(this).find('.popup').show();
            }, function() {
                $(this).find('.popup').hide();
            });
            $('.island').click(function() {
                $(this).find('.popup').show();
            });
        });
    </script>
</body>
</html>
